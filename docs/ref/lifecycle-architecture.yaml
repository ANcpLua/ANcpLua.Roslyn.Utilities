system:
  name: claude-md-lifecycle
  version: 0.3.0
  description: Self-improving agent instruction system with empirical scoring, stateful journaling, and convergence-driven emergent authority

pillars:
  scorer:
    role: isolated-rubric
    description: Empirical quality measurement without side effects
    properties:
      isolation: true
      side_effects: false
      callable_by: any
    inputs:
      - claude_md
      - agents_md
      - skill_md
    outputs:
      - numeric_score
      - findings
      - delta_from_previous
    combines:
      - skill-judge rubric
      - claude-md-improver audit
      - revise-claude-md semantic analysis

  journal:
    role: stateful-hook
    description: Change tracker bound to Claude Code session lifecycle
    hooks:
      - type: SessionStart
        action: initialize_journal_epoch
      - type: PostToolUse
        action: classify_and_append
        note: >
          PostToolUse receives {tool_name, tool_input, tool_output}.
          tool_name is one of: Edit, Write, Bash, Read, etc.
          Classification happens at the hook level via the mapping below.
          Unmatched tool calls are silently dropped (no journal entry).
      - type: Stop
        action: finalize_epoch

    # The hard part: tool calls → semantic categories.
    # PostToolUse gives us tool_name + parameters, not categories.
    # This mapping is the classification layer.
    tool_to_category:
      Edit:
        # tool_input contains file_path
        - match: "*.props"
          category: msbuild_props
        - match: "*.targets"
          category: msbuild_targets
        - match: "*.csproj"
          category: tree_structure
        - match: "*.slnx"
          category: tree_structure
        - match: "*.editorconfig"
          category: editorconfig
        - match: "*.cs"
          category: roslyn_symbols
          heuristic: >
            Shallow: any .cs edit → roslyn_symbols.
            Deep (future): parse tool_output diff for namespace/type/member
            changes vs. comment-only or whitespace-only edits.
            For v0.2 shallow is correct — false positives are cheap,
            false negatives lose context.
        - match: "*.ts|*.tsx|*.mts"
          category: typescript_config
        - match: "tsconfig*.json"
          category: typescript_config
        - match: "CLAUDE.md|AGENTS.md"
          category: agent_instructions
          note: tracked but never auto-modified (invariant)

      Write:
        # same matching as Edit — Write creates new files
        inherit: Edit
        additional:
          - match: "*.cs"
            category: tree_structure
            note: >
              Write of a new .cs file is tree_structure (new file in tree),
              not just roslyn_symbols. Both categories emitted.
            emit_also: roslyn_symbols

      Bash:
        # tool_input contains the command string
        - match: "^dotnet (add|remove|restore|new)"
          category: library_changes
        - match: "^dotnet build|^dotnet pack|^msbuild"
          category: msbuild_props
          note: build output may reveal new warnings/errors worth tracking
        - match: "^dotnet tool"
          category: library_changes
        - match: "^npm |^pnpm |^yarn "
          category: library_changes
        - match: "^mkdir |^rm |^mv |^cp "
          category: tree_structure
          heuristic: >
            Only when operating on src/ or project directories.
            Shell ops in /tmp or build artifacts are noise.
        - match: "^git "
          category: skip
          note: >
            Git operations are metadata, not content changes.
            The journal tracks what changed, not how it was committed.

      Read:
        category: skip
        note: >
          Read-only operations produce no state change.
          No journal entry. The journal is append-only for mutations.

    # Fallback for unrecognized tools or unmatched patterns
    classification_fallback:
      action: skip
      note: >
        Unknown tools or unmatched file patterns produce no journal entry.
        Conservative: silence over noise. If a category is missing,
        add a mapping — don't add a catch-all.

    lifecycle:
      bound_to: claude_code_session
      note: >
        One CLI invocation = one journal epoch.
        Parallel instances (e.g. 8-worktree pattern) each produce
        independent journal files keyed by session ID.

    storage:
      location: .claude/journal/{session-id}.jsonl
      scope: repo-local
      gitignored: true
      rationale: >
        Not ~/.claude/ (user-global, but journals are repo-scoped).
        Not git-tracked (ephemeral session context, not documentation).
        .claude/ is the standard Claude Code local config directory.
      format: jsonl
      one_line_per: observed_change
      schema:
        hook: string        # SessionStart | PostToolUse | Stop
        tool: string        # Edit | Write | Bash | null
        category: string    # msbuild_props | roslyn_symbols | ...
        path: string | null # file path if applicable
        detail: string      # human-readable summary of change
        ts: iso8601         # timestamp

    tracks:
      - tree_structure
      - msbuild_props
      - msbuild_targets
      - roslyn_symbols
      - library_changes
      - editorconfig
      - typescript_config
      - agent_instructions

    properties:
      persistent: true
      overwrites: false
      append_only: true

  refactor:
    role: structural-rewrites
    description: Progressive disclosure restructuring of instruction files
    inputs:
      - journal.output
      - scorer.findings
    operations:
      - split_monolithic_files
      - progressive_disclosure
      - remove_stale_entries
      - merge_duplicates
    combines:
      - agent-md-refactor

  accumulated_state:
    role: convergence-point
    description: Merged output from scorer + journal + refactor
    fed_by:
      - scorer
      - journal
      - refactor
    properties:
      grows_over_time: true
      resets: monthly

edges:
  - from: scorer
    to: accumulated_state
    data: scores_and_findings
    direction: bidirectional

  - from: journal
    to: accumulated_state
    data: change_observations
    direction: bidirectional

  - from: journal
    to: scorer
    data: change_context
    direction: bidirectional

  - from: refactor
    to: accumulated_state
    data: structural_changes
    direction: unidirectional

  - from: accumulated_state
    to: refactor
    data: findings_to_act_on
    direction: unidirectional

outputs:
  emergent_authority:
    source: accumulated_state
    description: Empirical data outranks hand-written rules over time
    constraints:
      - technical_authority_only: true
      - human_preferences_sovereign: true
      - black_box_respected: true
    convergence_detection:
      method: delta_stabilization
      description: >
        The scorer produces delta_from_previous on every run.
        When variance of deltas drops below epsilon over N consecutive
        scorer runs, accumulated state has converged. At that point,
        empirical findings carry more weight than hand-written rules
        for technical decisions.
      metric: silhouette_score_on_delta_trajectory
      note: >
        Same convergence math as PhD thesis (episodic convergence
        in fixed-weight LLM agents). Threshold is not configured —
        it is an emergent property observed, not set.
      threshold: emergent

  archival:
    source: accumulated_state
    description: Monthly state reset with history preservation
    schedule:
      type: cron
      interval: monthly
    destination: ancplua-research/CHANGELOGS/claude-plugins
    operation:
      - archive .claude/journal/*.jsonl
      - archive accumulated_state
      - reset .claude/journal/
      - reset accumulated_state

invariants:
  - scorer never mutates files
  - journal never asks questions
  - journal never modifies CLAUDE.md or AGENTS.md directly
  - refactor only acts on accumulated findings
  - refactor proposes instruction changes but never self-modifies without human approval
  - human taste overrides emergent authority
  - archival preserves full history
  - each pillar stays in its own domain
  - parallel sessions produce independent journals (no cross-contamination)

security:
  self_modification_guard:
    description: >
      Mirrors pydantic-ai fork security pattern. The system can suggest
      instruction file changes but never commits them autonomously.
      AGENTS.md/CLAUDE.md/.claude/ modifications require human approval.
    enforced_by: refactor pillar invariant
    reference: docs/workflow-comparison/pydantic-ai.yml