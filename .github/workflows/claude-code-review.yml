name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - 'CHANGELOG.md'
      - '**/*.lock'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    if: |
      github.actor != 'coderabbitai[bot]' &&
      !contains(github.event.pull_request.title, '[skip review]') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 20

      - name: Run Claude Code Review (agentic)
        id: claude-review
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot],renovate[bot]'
          track_progress: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          claude_args: '--model claude-opus-4-7 --max-turns 25'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Operating mode: **agentic**. You have write access to this PR branch.

            Decision tree:
            1. **Mechanically fixable** (formatting, naming, missing CancellationToken,
               IDisposable not disposed, .Result/.Wait blocking-async, DateTime.Now,
               null-forgiving `!`, ISourceGenerator that should be IIncrementalGenerator,
               public type in Sources/ that should be internal, polyfill not gated by
               #if directive, ISymbol stored in incremental model) → fix in a commit
               pushed to this branch. Don't ask.
            2. **Structural concern needing human judgment** (architectural trade-off,
               novel pattern, transitive-dependency conflict, breaking API in Sources/
               which propagates to source-consumers immediately, polyfill that diverges
               from BCL behavior) → flag in a comment and stop.
            3. **Clean** → post a single approval-style comment and stop.

            Read AGENTS.md / CLAUDE.md / .coderabbit.yaml — the ARCHITECTURAL
            INVARIANTS sections (especially under Sources/) are authoritative.
