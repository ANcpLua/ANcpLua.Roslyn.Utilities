name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true

# Coalesce in-flight runs on the same ref. Don't cancel: a tag push that races a main push
# must still complete its publish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only. Jobs that need more (publish) opt in explicitly.
permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CI: true

jobs:
  # Compute version once. Tags and workflow_dispatch produce a release version;
  # everything else gets a CI build number derived from commit count + sha.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: ver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git rev-list --count HEAD)
            SHA=$(git rev-parse --short HEAD)
            echo "version=0.0.$COMMITS-ci.g$SHA" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  # Build on both Linux and Windows to catch path-case and platform-specific build issues
  # early. Pack/upload only from Linux to avoid duplicate artifacts (output is netstandard2.0,
  # platform-invariant, so a single nupkg set is correct).
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore ANcpLua.Roslyn.Utilities.slnx
      - name: Build
        run: dotnet build ANcpLua.Roslyn.Utilities.slnx -c Release --no-restore -p:Version=${{ needs.version.outputs.version }}

      # Stable packages — packed once on Linux only.
      - name: Pack (stable)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/ANcpLua.Roslyn.Utilities/ANcpLua.Roslyn.Utilities.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Polyfills/ANcpLua.Roslyn.Utilities.Polyfills.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Sources/ANcpLua.Roslyn.Utilities.Sources.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Testing.Aot/ANcpLua.Roslyn.Utilities.Testing.Aot.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Testing/ANcpLua.Roslyn.Utilities.Testing.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build

      # AgentTesting + Testing.Workflows moved to https://github.com/ANcpLua/ANcpLua.Agents
      # (2026-04-19) and publish from that repo's own workflow.

      - name: Upload artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  # Publish only on tagged releases or workflow_dispatch. The `nuget` environment provides
  # the manual approval gate and houses the trusted publishing config.
  #
  # Trusted publishing setup (one-time, per package):
  #   1. Visit https://www.nuget.org/account/trustedpublishing
  #   2. For each ANcpLua.Roslyn.Utilities.* package owned by ANcpLua, add a GitHub policy
  #      pointing at this repo + workflow file (`nuget-publish.yml`) + environment (`nuget`).
  #   3. No NUGET_API_KEY secret required — OIDC handles auth.
  publish:
    needs: [version, build]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write   # for gh release create
      id-token: write   # for trusted publishing OIDC token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: artifacts/
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5

      - name: Authenticate to NuGet (trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Push to NuGet
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
