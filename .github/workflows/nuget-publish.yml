name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (without v prefix). Leave empty to auto-bump from latest tag.'
        required: false

# Coalesce in-flight runs on the same ref so two main pushes don't race to publish the same version.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only. Jobs that need more (publish) opt in explicitly.
permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  CI: true

jobs:
  # Compute version by reading the latest v* tag and bumping the patch.
  # If HEAD is exactly the tag, reuse the version (re-run safe).
  # workflow_dispatch with an explicit version overrides the auto-bump.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: ver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Workflow dispatch override: $VERSION"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR=${BASH_REMATCH[1]}
              MINOR=${BASH_REMATCH[2]}
              PATCH=${BASH_REMATCH[3]}
              if git tag --points-at HEAD | grep -qx "$LATEST_TAG"; then
                VERSION="$MAJOR.$MINOR.$PATCH"
                echo "HEAD is tagged $LATEST_TAG — reusing version: $VERSION"
              else
                PATCH=$((PATCH + 1))
                VERSION="$MAJOR.$MINOR.$PATCH"
                echo "Commits after $LATEST_TAG — bumped to: $VERSION"
              fi
            else
              VERSION="0.0.1"
              echo "No v* tag found — defaulting to: $VERSION"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Build on both Linux and Windows to catch path-case and platform-specific build issues
  # early. Pack/upload only from Linux to avoid duplicate artifacts (output is netstandard2.0,
  # platform-invariant, so a single nupkg set is correct).
  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore ANcpLua.Roslyn.Utilities.slnx
      - name: Build
        run: dotnet build ANcpLua.Roslyn.Utilities.slnx -c Release --no-restore -p:Version=${{ needs.version.outputs.version }}

      # Stable packages — packed once on Linux only.
      - name: Pack (stable)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet pack src/ANcpLua.Roslyn.Utilities/ANcpLua.Roslyn.Utilities.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Polyfills/ANcpLua.Roslyn.Utilities.Polyfills.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Sources/ANcpLua.Roslyn.Utilities.Sources.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Testing.Aot/ANcpLua.Roslyn.Utilities.Testing.Aot.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build
          dotnet pack src/ANcpLua.Roslyn.Utilities.Testing/ANcpLua.Roslyn.Utilities.Testing.csproj -c Release -o artifacts -p:Version=${{ needs.version.outputs.version }} --no-build

      # AgentTesting + Testing.Workflows moved to https://github.com/ANcpLua/ANcpLua.Agents
      # (2026-04-19) and publish from that repo's own workflow.

      - name: Upload artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  # Publish on push to main (auto-bump-on-merge) or workflow_dispatch override.
  # The `Must Publish Packages` gate diffs against the latest tag — docs-only PRs skip publish.
  # The `nuget` environment houses the trusted publishing config.
  #
  # Trusted publishing setup (one-time, per package):
  #   1. Visit https://www.nuget.org/account/trustedpublishing
  #   2. For each ANcpLua.Roslyn.Utilities.* package owned by ANcpLua, add a GitHub policy
  #      pointing at this repo + workflow file (`nuget-publish.yml`) + environment (`nuget`).
  #   3. No NUGET_API_KEY secret required — OIDC handles auth.
  publish:
    needs: [version, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write   # for gh release create
      id-token: write   # for trusted publishing OIDC token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Must Publish Packages
        id: has_changes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tag — first publish, proceeding"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git diff --name-only "$LATEST_TAG" HEAD -- 'src/**' 'tests/**' || true)
            if [ -n "$CHANGES" ]; then
              echo "Changes since $LATEST_TAG:"
              echo "$CHANGES"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No src/ or tests/ changes since $LATEST_TAG — skipping publish"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: steps.has_changes.outputs.has_changes == 'true'
        with:
          name: packages
          path: artifacts/

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        if: steps.has_changes.outputs.has_changes == 'true'

      - name: Authenticate to NuGet (trusted publishing)
        if: steps.has_changes.outputs.has_changes == 'true'
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua

      - name: Push to NuGet
        if: steps.has_changes.outputs.has_changes == 'true'
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

      - name: Create GitHub release
        if: steps.has_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi
