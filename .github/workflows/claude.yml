name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # ── Step 1: Detect fork PRs ────────────────────────────────────────────────
  get-pr-info:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      ) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
        github.event.comment.author_association ||
        github.event.review.author_association ||
        github.event.issue.author_association)
    runs-on: ubuntu-latest
    outputs:
      is_fork: ${{ steps.pr-info.outputs.is_fork }}
      pr_head_repo: ${{ steps.pr-info.outputs.pr_head_repo }}
      pr_head_ref: ${{ steps.pr-info.outputs.pr_head_ref }}
    steps:
      - name: Get PR info
        if: github.event.issue.pull_request || github.event.pull_request
        id: pr-info
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.event.issue.number }}
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})
          echo "pr_head_repo=$(echo "$PR_DATA" | jq -r '.head.repo.full_name')" >> $GITHUB_OUTPUT
          echo "pr_head_ref=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "is_fork=$(echo "$PR_DATA" | jq -r '.head.repo.fork')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2a: Standard @claude (non-fork) ───────────────────────────────────
  claude:
    needs: get-pr-info
    if: needs.get-pr-info.outputs.is_fork != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read

  # ── Step 2b: Fork @claude (restricted, config-file guard) ──────────────────
  claude-fork:
    needs: get-pr-info
    if: needs.get-pr-info.outputs.is_fork == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.get-pr-info.outputs.pr_head_repo }}
          ref: ${{ needs.get-pr-info.outputs.pr_head_ref }}
          fetch-depth: 1

      # Block fork PRs that tamper with Claude's configuration surface:
      #   CLAUDE.md  — loaded from directory hierarchy at launch
      #   .claude/   — project settings, memory, rules
      #   MEMORY.md  — first 200 lines loaded at every conversation start
      - name: Guard Claude config files
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.event.issue.number }}
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only --repo ${{ github.repository }})
          if echo "$CHANGED" | grep -qiE '(^|/)CLAUDE\.md$|(^|/)\.claude/|(^|/)MEMORY\.md$'; then
            echo "::error::Fork PR modifies Claude configuration (CLAUDE.md, .claude/, or MEMORY.md). Blocked for prompt-injection safety."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      # Fork job: no git write tools (push/commit/checkout) — read-only analysis
      - name: Run Claude Code (fork-safe)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh run view:*),Bash(gh run list:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status:*),Bash(dotnet build:*),Bash(dotnet test:*),Bash(rg:*),Bash(ls:*),Bash(tree:*),Read,Glob,Grep"

  # ── Autonomous /reproduce pipeline ─────────────────────────────────────────
  reproduce:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/reproduce') &&
      github.actor != 'claude[bot]' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: reproduce-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore packages
        run: dotnet restore

      - name: Run Claude Code (reproduce & fix)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools Bash,Edit,Read,Write,Glob,Grep
          additional_permissions: |
            actions: read
          prompt: |
            You are an autonomous .NET coding agent running in CI.
            A maintainer commented "/reproduce" on an issue — your job is to reproduce it with a failing test and fix it.

            === Context ===
            REPO: ${{ github.repository }}
            ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            URL: ${{ github.event.issue.html_url }}

            ISSUE BODY:
            ${{ github.event.issue.body }}

            === .NET Environment ===
            - Runtime: .NET 10.0, C# 14, target net10.0
            - Test framework: xUnit v3 with Microsoft.Testing.Platform (MTP)
            - Assertions: AwesomeAssertions (not FluentAssertions)
            - Build: `dotnet build -c Release`
            - Test: `dotnet test -c Release`
            - MTP exit code 8 = zero tests matched your filter (check spelling)
            - Test naming: MethodName_Scenario_ExpectedResult
            - Banned: DateTime.Now (use TimeProvider), object lock (use Lock), Newtonsoft (use STJ)
            - Never silence analyzer diagnostics

            === Goal ===
            Produce exactly ONE of these outcomes:
            1. Repro PR + Fix PR (preferred for actionable bugs)
            2. Repro PR only (if reproducible but cannot fix)
            3. Comment-only (needs info / not reproducible / question)

            === Step 0: Triage ===
            Extract from the issue:
            - Expected behavior (must be explicit and testable)
            - Actual behavior
            - Repro steps or minimal example
            If any of these are missing, post a comment requesting the minimum details and STOP.

            === Step 1: Write a failing reproduction test ===
            - Find the most relevant existing test project under tests/
            - Write a focused xUnit test that asserts the EXPECTED behavior
            - Test name: descriptive of intended behavior, NO issue numbers in code
            - Include at least one "anti-noop" assertion (verifies something actually happened)
            - Prefer asserting concrete values/state over "does not throw"

            === Step 2: Verify it fails on the current base ===
            Run: `dotnet test -c Release --filter "FullyQualifiedName~YourTestClassName"`
            - The test MUST FAIL due to an assertion mismatch (not build error or setup issue)
            - If it passes: the bug is not reproducible — comment findings and STOP
            - Do NOT weaken assertions to fake a reproduction

            Commit and open PR:
            - Branch: `ai/issue-${{ github.event.issue.number }}-repro`
            - Commit: `test: reproduce <behavior> (issue #${{ github.event.issue.number }})`
            - PR title: `[repro] <short behavior> (#${{ github.event.issue.number }})`
            - PR body: link issue, what test asserts, observed failure output

            === Step 3: Implement the fix (stacked on repro) ===
            Create fix branch FROM the repro branch:
            - Branch: `ai/issue-${{ github.event.issue.number }}-fix`
            - Make the minimal code change to fix the behavior
            - Run: `dotnet build -c Release` (must succeed, 0 warnings)
            - Run: `dotnet test -c Release` (previously failing test must now pass)
            - Do NOT fix by swallowing/ignoring/guarding away the problem
            - Keep changes minimal — no drive-by refactors or formatting

            Commit and open stacked PR:
            - Base: the repro branch
            - Commit: `fix: <behavior> (issue #${{ github.event.issue.number }})`
            - PR title: `[fix] <short behavior> (#${{ github.event.issue.number }})`
            - PR body: link issue + repro PR, root cause, fix explanation

            === If stuck ===
            - Still open the repro PR if it's valid
            - Post a comment summarizing findings and blockers
            - Do NOT force a broken fix

            === Quality gate ===
            Before marking done, verify:
            - [ ] Test asserts expected behavior (not just "no throw")
            - [ ] Test fails on base for the right reason
            - [ ] Fix makes test pass without weakening assertions
            - [ ] `dotnet build -c Release` succeeds with 0 warnings
            - [ ] Changes are minimal and scoped

            === Final ===
            Post a comment on the issue summarizing what you did and linking any PRs.

            Proceed now.
